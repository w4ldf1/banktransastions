<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DFD</title>
  <style>
    body {
      margin: 0;
      padding: 28px;
      font-family: Arial, sans-serif;
      color: #111827;
      background: #f5f7fb;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 22px;
      font-weight: 700;
    }
    .sheet {
      width: 1480px;
      max-width: calc(100vw - 56px);
      overflow: auto;
      background: #ffffff;
      border: 1px solid #d1d5db;
      padding: 18px;
    }
    svg {
      display: block;
      width: 1440px;
      height: 620px;
      background: #ffffff;
    }
    .entity, .process, .store {
      fill: #ffffff;
      stroke: #111827;
      stroke-width: 2;
    }
    .process {
      rx: 16;
      ry: 16;
    }
    .store-left {
      fill: none;
      stroke: #111827;
      stroke-width: 2;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
    }
    .text {
      font-size: 15px;
    }
    .small {
      font-size: 13px;
    }
    .label {
      font-size: 13px;
      fill: #111827;
      paint-order: stroke;
      stroke: #ffffff;
      stroke-width: 5px;
      stroke-linejoin: round;
    }
    .arrow {
      fill: none;
      stroke: #111827;
      stroke-width: 2;
      marker-end: url(#arrow);
    }
  </style>
</head>
<body>
  <h1>DFD</h1>
  <div class="sheet">
    <svg viewBox="0 0 1440 620" role="img" aria-label="DFD банковских транзакций">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L9,3 z" fill="#111827"></path>
        </marker>
      </defs>

      <text x="720" y="34" text-anchor="middle" class="title">DFD: управление банковскими транзакциями</text>

      <rect x="36" y="112" width="150" height="82" class="entity"></rect>
      <text x="111" y="148" text-anchor="middle" class="text">Оператор</text>
      <text x="111" y="170" text-anchor="middle" class="text">банка</text>

      <rect x="260" y="90" width="210" height="126" class="process"></rect>
      <text x="365" y="125" text-anchor="middle" class="small">1.0</text>
      <text x="365" y="153" text-anchor="middle" class="text">Оконный клиент</text>
      <text x="365" y="176" text-anchor="middle" class="text">и ввод данных</text>

      <rect x="545" y="90" width="210" height="126" class="process"></rect>
      <text x="650" y="125" text-anchor="middle" class="small">2.0</text>
      <text x="650" y="153" text-anchor="middle" class="text">HTTP API</text>
      <text x="650" y="176" text-anchor="middle" class="text">сервера</text>

      <rect x="860" y="66" width="190" height="112" class="process"></rect>
      <text x="955" y="98" text-anchor="middle" class="small">3.0</text>
      <text x="955" y="126" text-anchor="middle" class="text">Авторизация</text>
      <text x="955" y="149" text-anchor="middle" class="text">пользователя</text>

      <rect x="860" y="244" width="190" height="126" class="process"></rect>
      <text x="955" y="279" text-anchor="middle" class="small">4.0</text>
      <text x="955" y="307" text-anchor="middle" class="text">CRUD, поиск</text>
      <text x="955" y="330" text-anchor="middle" class="text">и перевод</text>

      <rect x="1168" y="48" width="220" height="58" class="store"></rect>
      <line x1="1198" y1="48" x2="1198" y2="106" class="store-left"></line>
      <text x="1293" y="83" text-anchor="middle" class="text">D1 Users</text>

      <rect x="1168" y="156" width="220" height="58" class="store"></rect>
      <line x1="1198" y1="156" x2="1198" y2="214" class="store-left"></line>
      <text x="1293" y="191" text-anchor="middle" class="text">D2 Customers</text>

      <rect x="1168" y="252" width="220" height="58" class="store"></rect>
      <line x1="1198" y1="252" x2="1198" y2="310" class="store-left"></line>
      <text x="1293" y="287" text-anchor="middle" class="text">D3 Accounts</text>

      <rect x="1168" y="348" width="220" height="58" class="store"></rect>
      <line x1="1198" y1="348" x2="1198" y2="406" class="store-left"></line>
      <text x="1293" y="383" text-anchor="middle" class="text">D4 PartnerBanks</text>

      <rect x="1168" y="444" width="220" height="58" class="store"></rect>
      <line x1="1198" y1="444" x2="1198" y2="502" class="store-left"></line>
      <text x="1293" y="479" text-anchor="middle" class="text">D5 Transactions</text>

      <rect x="548" y="438" width="230" height="74" class="entity"></rect>
      <text x="663" y="468" text-anchor="middle" class="text">Администратор</text>
      <text x="663" y="491" text-anchor="middle" class="text">системы</text>

      <path d="M186 135 H260" class="arrow"></path>
      <text x="223" y="125" text-anchor="middle" class="label">логин, пароль</text>
      <path d="M186 170 H260" class="arrow"></path>
      <text x="222" y="195" text-anchor="middle" class="label">команды CRUD / перевод / фильтр</text>

      <path d="M470 132 H545" class="arrow"></path>
      <text x="508" y="122" text-anchor="middle" class="label">HTTP JSON-запрос</text>
      <path d="M545 176 H470" class="arrow"></path>
      <text x="508" y="203" text-anchor="middle" class="label">DTO, ошибки валидации</text>

      <path d="M755 112 H860" class="arrow"></path>
      <text x="808" y="101" text-anchor="middle" class="label">учетные данные</text>
      <path d="M860 154 H755" class="arrow"></path>
      <text x="809" y="181" text-anchor="middle" class="label">bearer-токен / отказ</text>

      <path d="M755 178 C800 178 800 272 860 272" class="arrow"></path>
      <text x="797" y="236" text-anchor="middle" class="label">запрос операции + mode</text>
      <path d="M860 342 C800 342 800 206 755 206" class="arrow"></path>
      <text x="798" y="368" text-anchor="middle" class="label">результат операции</text>

      <path d="M1050 91 H1168" class="arrow"></path>
      <text x="1109" y="79" text-anchor="middle" class="label">поиск пользователя</text>
      <path d="M1168 104 H1050" class="arrow"></path>
      <text x="1109" y="130" text-anchor="middle" class="label">роль и хеш пароля</text>

      <path d="M1050 278 H1168" class="arrow"></path>
      <text x="1109" y="267" text-anchor="middle" class="label">чтение/запись счетов</text>
      <path d="M1168 306 H1050" class="arrow"></path>
      <text x="1109" y="329" text-anchor="middle" class="label">балансы и номера счетов</text>

      <path d="M1050 252 C1105 252 1105 185 1168 185" class="arrow"></path>
      <text x="1110" y="222" text-anchor="middle" class="label">данные клиентов</text>
      <path d="M1168 207 C1112 207 1112 296 1050 296" class="arrow"></path>
      <text x="1110" y="244" text-anchor="middle" class="label">найденные клиенты</text>

      <path d="M1050 320 C1108 320 1108 377 1168 377" class="arrow"></path>
      <text x="1111" y="360" text-anchor="middle" class="label">банк-партнер и комиссия</text>
      <path d="M1050 354 C1108 354 1108 473 1168 473" class="arrow"></path>
      <text x="1113" y="430" text-anchor="middle" class="label">запись транзакции</text>

      <path d="M663 438 V386 C663 334 770 334 860 334" class="arrow"></path>
      <text x="717" y="399" text-anchor="middle" class="label">настройка справочников</text>

      <path d="M260 205 C212 262 212 334 260 392 C350 499 545 530 860 524 C1030 520 1110 502 1168 502" class="arrow"></path>
      <text x="356" y="515" text-anchor="middle" class="label">просмотр истории операций</text>
    </svg>
  </div>
</body>
</html>
