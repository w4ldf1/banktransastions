<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IDEF3</title>
  <style>
    body {
      margin: 0;
      padding: 28px;
      font-family: Arial, sans-serif;
      color: #111827;
      background: #f5f7fb;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 22px;
      font-weight: 700;
    }
    .sheet {
      width: 1580px;
      max-width: calc(100vw - 56px);
      overflow: auto;
      background: #ffffff;
      border: 1px solid #d1d5db;
      padding: 12px;
    }
    svg {
      display: block;
      width: 1540px;
      height: 920px;
      background: #ffffff;
    }
    .frame, .line, .uob, .junction {
      fill: none;
      stroke: #111827;
      stroke-width: 2;
    }
    .uob {
      fill: #ffffff;
    }
    .shadow {
      fill: #d9d9d9;
      stroke: none;
    }
    .junction {
      fill: #ffffff;
    }
    .arrow {
      fill: none;
      stroke: #111827;
      stroke-width: 2;
      marker-end: url(#arrow);
    }
    .text {
      font-size: 16px;
    }
    .small {
      font-size: 13px;
    }
    .head {
      font-size: 15px;
      font-weight: 700;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
    }
    .label {
      font-size: 14px;
      fill: #111827;
      paint-order: stroke;
      stroke: #ffffff;
      stroke-width: 4px;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

      <line x1="1300" y1="472" x2="1470" y2="472" class="line"></line>

      <line x1="364" y1="734" x2="582" y2="734" class="line"></line>
      <text x="378" y="750" class="small">12</text>

      <line x1="678" y1="734" x2="896" y2="734" class="line"></line>
      <text x="692" y="750" class="small">13</text>

      <rect x="994" y="658" width="218" height="112" class="shadow"></rect>
      <rect x="982" y="646" width="218" height="112" class="uob"></rect>

      <text x="1091" y="710" text-anchor="middle" class="text">интерфейс</text>
      <line x1="982" y1="734" x2="1200" y2="734" class="line"></line>
      <text x="996" y="750" class="small">14</text>

      <path d="M154 156 H338" class="arrow"></path>

      <path d="M824 420 H898" class="arrow"></path>

      <path d="M824 444 C850 444 850 560 898 560" class="arrow"></path>

      <path d="M1200 702 H1470" class="arrow"></path>
      <text x="1340" y="690" text-anchor="middle" class="label">список обновлен</text>

      <text x="36" y="830" class="head">NODE:</text>
      <text x="160" y="848" class="title">A0.3</text>
      <text x="350" y="830" class="head">TITLE:</text>
      <text x="790" y="848" text-anchor="middle" class="title">Провести банковскую транзакцию</text>

  </div>
</body>
</html>
